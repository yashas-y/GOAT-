<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GOAT Runner — Messi vs Ronaldo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { background: #0d0d1a; font-family: 'Courier New', monospace; color: #fff; }
  #wrap { position: relative; width: 100vw; height: 100vh; }
  canvas#gameCanvas { display: block; width: 100%; height: 100%; }

  #select-screen {
    position: absolute; inset: 0; background: #0d0d1a;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    gap: 18px; padding: 24px 16px 40px; overflow-y: auto;
  }
  .game-title {
    font-size: 30px; font-weight: 900; letter-spacing: 4px;
    color: #FFD700; text-shadow: 3px 3px 0 #B8860B, 6px 6px 0 #8B6914;
    text-align: center; line-height: 1.3;
  }
  .subtitle { font-size: 11px; letter-spacing: 6px; color: #888; text-transform: uppercase; margin-top: 6px; text-align: center; }
  .section-label { font-size: 10px; letter-spacing: 3px; color: #aaa; text-transform: uppercase; margin-bottom: 8px; text-align: center; }
  .player-row { display: flex; gap: 20px; justify-content: center; }
  .player-card { width: 120px; border: 2px solid #333; border-radius: 4px; padding: 12px 8px; text-align: center; cursor: pointer; transition: all .15s; background: #111; }
  .player-card:hover { border-color: #FFD700; background: #1a1800; }
  .player-card.selected { border-color: #FFD700; background: #1a1800; box-shadow: 0 0 12px #FFD70066; }
  .player-name { font-size: 11px; letter-spacing: 2px; margin-top: 6px; color: #FFD700; font-weight: bold; }
  .player-country { font-size: 9px; color: #888; letter-spacing: 1px; }
  .jersey-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; max-width: 420px; }
  .jersey-card { border: 2px solid #333; border-radius: 4px; padding: 8px; cursor: pointer; text-align: center; background: #111; transition: all .15s; width: 72px; }
  .jersey-card:hover { border-color: #aaa; }
  .jersey-card.selected { border-color: #FFD700; box-shadow: 0 0 8px #FFD70066; }
  .jersey-label { font-size: 8px; color: #888; margin-top: 4px; letter-spacing: 1px; }
  .name-input { background: #111; border: 2px solid #333; border-radius: 4px; color: #FFD700; font-family: 'Courier New', monospace; font-size: 13px; letter-spacing: 2px; padding: 8px 12px; text-align: center; width: 200px; text-transform: uppercase; }
  .name-input:focus { outline: none; border-color: #FFD700; }
  .start-btn { background: #FFD700; color: #000; border: none; border-radius: 4px; padding: 12px 40px; font-family: 'Courier New', monospace; font-size: 13px; font-weight: 900; letter-spacing: 3px; cursor: pointer; text-transform: uppercase; transition: all .1s; }
  .start-btn:hover { background: #fff; transform: scale(1.04); }
  .personal-best-tag { font-size: 10px; color: #FFD700; letter-spacing: 2px; }

  #hud { position: absolute; top: 10px; left: 12px; display: none; }
  .hud-label { font-size: 9px; color: #888; letter-spacing: 2px; }
  .hud-score { font-size: 22px; color: #FFD700; font-weight: 900; letter-spacing: 2px; }
  .hud-best { font-size: 10px; color: #888; letter-spacing: 1px; margin-top: 2px; }

  #leaderboard-panel { position: absolute; top: 10px; right: 12px; background: rgba(0,0,0,.78); border: 1px solid #333; border-radius: 4px; padding: 10px 14px; font-size: 10px; min-width: 150px; display: none; }
  .lb-title { color: #FFD700; letter-spacing: 2px; font-size: 9px; margin-bottom: 6px; display: flex; justify-content: space-between; }
  .lb-row { display: flex; justify-content: space-between; color: #ccc; padding: 2px 0; gap: 10px; }
  .lb-rank { color: #555; min-width: 18px; }
  .lb-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lb-status { font-size: 8px; color: #555; margin-top: 4px; letter-spacing: 1px; }

  #vs-section { width: 100%; max-width: 460px; }
  .vs-bar { display: flex; align-items: center; justify-content: center; gap: 16px; }
  .vs-side { flex: 1; text-align: center; padding: 8px; border-radius: 4px; border: 2px solid #222; transition: all .2s; }
  .vs-side.winning { border-color: #FFD700; background: #1a1800; box-shadow: 0 0 12px #FFD70044; }
  .vs-name { font-size: 11px; letter-spacing: 2px; color: #aaa; }
  .vs-score { font-size: 26px; font-weight: 900; color: #FFD700; letter-spacing: 1px; }
  .vs-divider { font-size: 14px; color: #555; font-weight: 900; letter-spacing: 2px; }
  .vs-meter { height: 8px; background: #DA291C; border-radius: 4px; margin: 10px 0; overflow: hidden; position: relative; }
  .vs-meter-fill { height: 100%; width: 50%; background: #74ACDF; transition: width .4s ease; }
  .vs-winner { text-align: center; font-size: 10px; letter-spacing: 2px; color: #FFD700; height: 14px; margin-bottom: 8px; }
  .dual-lb { display: flex; gap: 16px; margin-top: 6px; }
  .dual-lb-col { flex: 1; background: rgba(0,0,0,.4); border: 1px solid #222; border-radius: 4px; padding: 8px 10px; }
  .dual-lb-list { max-height: 180px; overflow-y: auto; }
  .dual-lb-list::-webkit-scrollbar { width: 6px; }
  .dual-lb-list::-webkit-scrollbar-thumb { background: #FFD70055; border-radius: 3px; }
  .dual-lb-list::-webkit-scrollbar-track { background: #111; }
  .my-rank-tag { font-size: 9px; color: #FFD700; text-align: center; margin-top: 6px; letter-spacing: 1px; padding-top: 6px; border-top: 1px solid #222; }
  .dual-lb-title { font-size: 8px; letter-spacing: 1px; color: #888; margin-bottom: 6px; text-align: center; }

  /* compact layout for shorter screens so nothing clips */
  @media (max-height: 780px) {
    #select-screen { gap: 12px; padding: 14px 16px 30px; }
    .game-title { font-size: 22px; }
    .subtitle { margin-top: 3px; }
    .player-card { padding: 8px 8px; }
    .player-card canvas, .jersey-card canvas { transform: scale(0.85); }
    .vs-score { font-size: 22px; }
    .section-label { margin-bottom: 4px; }
    .jersey-card { padding: 5px; }
  }
  @media (max-height: 640px) {
    .game-title { font-size: 18px; }
    .dual-lb { display: none; }  /* hide detailed lists, keep the VS bar */
  }

  #gameover-screen { position: absolute; inset: 0; background: rgba(0,0,0,.88); display: none; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
  .go-title { font-size: 34px; color: #FFD700; letter-spacing: 4px; font-weight: 900; text-shadow: 3px 3px 0 #8B6914; }
  .go-score { font-size: 16px; color: #ccc; letter-spacing: 2px; }
  .go-best { font-size: 12px; color: #FFD700; letter-spacing: 2px; }
  .btn-row { display: flex; gap: 12px; }
  .go-btn { background: transparent; color: #FFD700; border: 2px solid #FFD700; border-radius: 4px; padding: 10px 24px; font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 2px; cursor: pointer; transition: all .1s; text-transform: uppercase; }
  .go-btn:hover { background: #FFD700; color: #000; }
  #speed-indicator { position: absolute; bottom: 10px; left: 12px; font-size: 9px; color: #555; letter-spacing: 1px; display: none; }
  .hint { font-size: 10px; color: #555; letter-spacing: 1px; text-align: center; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="gameCanvas"></canvas>

  <div id="select-screen">

      <div class="game-title">GOAT RUNNER</div>

    <div>

    <div>

    <div style="text-align:center">
      <div class="section-label">Your name (for the leaderboard)</div>
      <input class="name-input" id="player-name-input" maxlength="12" placeholder="ENTER NAME" />

    </div>

    <button class="start-btn" onclick="startGame()">KICK OFF</button>
    <div class="hint">SPACE / UP / TAP to jump</div>

  <div id="hud">

  <div id="leaderboard-panel">
    <div class="lb-title"><span id="lb-panel-title">TOP RUNS</span></div>
    <div id="lb-entries"></div>

      <button class="go-btn" onclick="restartGame()">PLAY AGAIN</button>

</div>

<script>
/* ============================================================
   SUPABASE CONFIG  — fill these two in (see setup steps)
   ============================================================ */
const SUPABASE_URL = "https://pcxiuftsxofmyaqfyzuj.supabase.co";       // e.g. https://abcdefgh.supabase.co
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBjeGl1ZnRzeG9mbXlhcWZ5enVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5ODI1NTgsImV4cCI6MjA5NzU1ODU1OH0.Djvu3eSJoUvq4tGvekZmXG1uBPS03mnfsW6_lcTk-oc";  // your public anon key
const LB_ENABLED = SUPABASE_URL && SUPABASE_ANON_KEY;

async function sbInsertScore(name, score, player, jersey) {
  if (!LB_ENABLED) { console.warn("[GOAT] leaderboard disabled — keys not set"); return; }
  // client-side plausibility: score advances ~1/frame at ~60fps, so a real
  // run of `score` points takes at least ~score/70 seconds. reject impossible speed.
  const elapsedSec = (Date.now() - runStartTime) / 1000;
  const maxPlausible = elapsedSec * 70 + 50; // generous headroom for fast machines
  if (score > maxPlausible) {
    console.warn("[GOAT] score rejected client-side (too fast for elapsed time)");
    return;
  }
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/scores`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
        "Prefer": "return=minimal"
      },
      body: JSON.stringify({ name, score, player, jersey })
    });
    if (!res.ok) {
      const txt = await res.text();
      console.error("[GOAT] score insert FAILED", res.status, txt);
    } else {
      console.log("[GOAT] score saved:", name, score, player);
    }
  } catch (e) { console.error("[GOAT] insert threw", e); }
}

async function sbFetchTopForPlayer(who, limit) {
  if (!LB_ENABLED) return null;
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/scores?select=name,score&player=eq.${who}&order=score.desc&limit=${limit||50}`, {
      headers: { "apikey": SUPABASE_ANON_KEY, "Authorization": `Bearer ${SUPABASE_ANON_KEY}` }
    });
    if (!r.ok) { console.error("[GOAT] fetch failed", who, r.status, await r.text()); return null; }
    return await r.json();
  } catch (e) { console.error("[GOAT] fetch threw", e); return null; }
}

// how many scores (for this player) are strictly higher than `myScore`.
// rank = that count + 1. only meaningful within top 200.
async function sbFetchRank(who, myScore) {
  if (!LB_ENABLED || !myScore) return null;
  try {
    // ask for up to 200 better scores; use Content-Range header to get exact count
    const r = await fetch(`${SUPABASE_URL}/rest/v1/scores?select=score&player=eq.${who}&score=gt.${myScore}&limit=200`, {
      headers: {
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
        "Prefer": "count=exact",
        "Range-Unit": "items",
        "Range": "0-199"
      }
    });
    if (!r.ok) return null;
    const cr = r.headers.get("content-range"); // format like "0-49/137"
    let better;
    if (cr && cr.includes("/")) {
      const total = cr.split("/")[1];
      better = total === "*" ? (await r.json()).length : parseInt(total, 10);
    } else {
      better = (await r.json()).length;
    }
    return better + 1; // rank
  } catch (e) { return null; }
}

/* ============================================================
   PERSONAL BEST — localStorage (per device)
   ============================================================ */
function getPersonalBest() { return parseInt(localStorage.getItem("goat_personal_best") || "0", 10); }
function setPersonalBest(v) { localStorage.setItem("goat_personal_best", String(v)); }
function getSavedName() { return localStorage.getItem("goat_player_name") || ""; }
function setSavedName(n) { localStorage.setItem("goat_player_name", n); }

/* ============================================================
   CANVAS
   ============================================================ */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const SCALE = 3;

/* ============================================================
   AUDIO — Web Audio API, no external files
   ============================================================ */
let audioCtx = null;
let musicOn = true;
let musicNodes = [];
let musicTimer = null;

function initAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e) { audioCtx = null; }
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}

function playJumpSound() {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'square';
  o.frequency.setValueAtTime(420, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.12);
  g.gain.setValueAtTime(0.18, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + 0.18);
}

function playHitSound() {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(200, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.3);
  g.gain.setValueAtTime(0.25, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + 0.35);
}

// simple looping chiptune bassline + arp
const MUSIC_NOTES = [196.00, 246.94, 293.66, 246.94, 220.00, 261.63, 329.63, 261.63];
let musicStep = 0;
function startMusic() {
  if (!audioCtx || !musicOn) return;
  stopMusic();
  const tempo = 220; // ms per step
  musicTimer = setInterval(() => {
    if (!musicOn || !audioCtx) return;
    const note = MUSIC_NOTES[musicStep % MUSIC_NOTES.length];
    // bass
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'triangle';
    o.frequency.value = note / 2;
    g.gain.setValueAtTime(0.08, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + 0.2);
    // blip on offbeats
    if (musicStep % 2 === 0) {
      const o2 = audioCtx.createOscillator();
      const g2 = audioCtx.createGain();
      o2.type = 'square';
      o2.frequency.value = note;
      g2.gain.setValueAtTime(0.04, audioCtx.currentTime);
      g2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
      o2.connect(g2); g2.connect(audioCtx.destination);
      o2.start(); o2.stop(audioCtx.currentTime + 0.15);
    }
    musicStep++;
  }, tempo);
}
function stopMusic() { if (musicTimer) { clearInterval(musicTimer); musicTimer = null; } }
function toggleMusic() {
  musicOn = !musicOn;
  const btn = document.getElementById('music-toggle');
  if (btn) btn.textContent = musicOn ? '♪ MUSIC: ON' : '♪ MUSIC: OFF';
  if (musicOn && gameState === 'playing') startMusic();
  else stopMusic();
}

const jerseys = {
  messi: [
    { id: 'barca_home', label: 'Barca Home', body: '#004D9C', shorts: '#004D9C', stripe: '#A50044' },
    { id: 'argentina', label: 'Argentina', body: '#74ACDF', shorts: '#003F87', stripe: '#FFFFFF' },
    { id: 'psg', label: 'PSG', body: '#004170', shorts: '#004170', stripe: '#DA291C' },
    { id: 'inter_miami', label: 'Inter Miami', body: '#F7B5CD', shorts: '#231F20', stripe: '#FFFFFF' },
    { id: 'barca_away', label: 'Barca Away', body: '#FFD700', shorts: '#FFD700', stripe: '#004D9C' },
  ],
  ronaldo: [
    { id: 'man_utd', label: 'Man Utd', body: '#DA291C', shorts: '#FFFFFF', stripe: '#FFD700' },
    { id: 'portugal', label: 'Portugal', body: '#006600', shorts: '#DA291C', stripe: '#FFFFFF' },
    { id: 'real_madrid', label: 'Real Madrid', body: '#FFFFFF', shorts: '#FFFFFF', stripe: '#00529F' },
    { id: 'juve', label: 'Juventus', body: '#000000', shorts: '#000000', stripe: '#FFFFFF' },
    { id: 'al_nassr', label: 'Al Nassr', body: '#FFCC00', shorts: '#003087', stripe: '#000000' },
  ]
};

let selectedPlayer = 'messi';
let selectedJerseyIdx = 0;
let currentJersey = jerseys.messi[0];

function drawPlayerSprite(c, x, y, jersey, scale) {
  const s = scale || SCALE;
  c.save(); c.translate(x, y);
  const body = jersey.body, shorts = jersey.shorts, stripe = jersey.stripe;
  const skin = '#F5C6A0';
  const hair = selectedPlayer === 'messi' ? '#3D2000' : '#1a1a1a';
  function px(gx, gy, w, h, color) { c.fillStyle = color; c.fillRect(gx*s, gy*s, (w||1)*s, (h||1)*s); }
  px(-2,0,4,4,skin);
  px(-2,0,4,1,hair); px(-2,1,1,1,hair);
  if (selectedPlayer === 'ronaldo') px(1,1,1,1,hair);
  px(-1,2,1,1,'#333'); px(0,2,1,1,'#333');
  px(-1,3,2,1,'#c47a5a');
  px(-3,4,6,5,body);
  px(-1,4,2,5, stripe===body?body:stripe);
  px(-1,5,2,2, stripe!==body?stripe:body);
  px(-4,4,1,4,body); px(3,4,1,4,body);
  px(-4,8,1,1,skin); px(3,8,1,1,skin);
  px(-3,9,6,3,shorts);
  px(-3,12,2,4,skin); px(1,12,2,4,skin);
  px(-3,14,2,2,body); px(1,14,2,2,body);
  px(-3,16,2,1,'#111'); px(1,16,2,1,'#111');
  px(-3,17,1,1,'#888'); px(-2,17,1,1,'#888'); px(1,17,1,1,'#888'); px(2,17,1,1,'#888');
  c.restore();
}

function drawGoalpost(c, x, y) {
  const s = 2;
  c.fillStyle = '#FFFFFF';
  c.fillRect(x, y-40*s, 4*s, 40*s);
  c.fillRect(x+20*s, y-40*s, 4*s, 40*s);
  c.fillRect(x, y-40*s, 24*s, 4*s);
  c.fillStyle = 'rgba(255,255,255,0.3)';
  for (let i=0;i<5;i++) c.fillRect(x+4, y-40*s+4+i*10, 20*s, 2);
  for (let i=0;i<5;i++) c.fillRect(x+4+i*10, y-40*s+4, 2, 40*s-4);
}

function drawFireball(c, x, y, frame) {
  const r = 14, flicker = Math.sin(frame*0.3)*2;
  const grad = c.createRadialGradient(x,y,0,x,y,r+6+flicker);
  grad.addColorStop(0,'#FFFF00'); grad.addColorStop(0.4,'#FF6600'); grad.addColorStop(1,'rgba(200,0,0,0)');
  c.fillStyle = grad; c.beginPath(); c.arc(x,y,r+6+flicker,0,Math.PI*2); c.fill();
  c.fillStyle = '#FFFFFF'; c.beginPath(); c.arc(x,y,r*0.4,0,Math.PI*2); c.fill();
  c.fillStyle = '#FF4500';
  for (let i=0;i<5;i++){ const a=(i/5)*Math.PI*2+frame*0.05; const fx=x+Math.cos(a)*(r+flicker), fy=y+Math.sin(a)*(r+flicker); c.beginPath(); c.arc(fx,fy,5,0,Math.PI*2); c.fill(); }
}

function drawGround(c, y, w) {
  c.fillStyle = '#1a5c1a'; c.fillRect(0,y,w,60);
  c.fillStyle = '#22aa22';
  for (let x=0;x<w;x+=40) c.fillRect(x,y,20,4);
  c.fillStyle = '#FFFFFF'; c.fillRect(0,y,w,2);
}

let bgStars = [];
function regenStars(w,h){ bgStars=[]; for(let i=0;i<40;i++) bgStars.push([Math.random()*w, Math.random()*(h*0.4)]); }
function drawBg(c, w, h, frame) {
  c.fillStyle = '#0d0d1a'; c.fillRect(0,0,w,h);
  c.fillStyle = 'rgba(255,255,255,0.6)';
  bgStars.forEach(([sx,sy])=>{ const fl=Math.sin(frame*0.02+sx)>0.5?2:1.5; c.fillRect(sx,sy,fl,fl); });
  const crowdY = h*0.5;
  c.fillStyle = '#1a1a2e'; c.fillRect(0,crowdY,w,50);
  for (let i=0;i<w;i+=18){ const h2=20+Math.sin(i*0.3)*8; c.fillStyle='#222244'; c.fillRect(i,crowdY-h2,14,h2); c.fillStyle='#111133'; c.beginPath(); c.arc(i+7,crowdY-h2,6,0,Math.PI*2); c.fill(); }
  c.fillStyle = '#ffffaa'; c.fillRect(0,crowdY-60,6,70); c.fillRect(w-6,crowdY-60,6,70);
}

/* ============================================================
   GAME STATE
   ============================================================ */
let gameState = 'select';
let score = 0, frame = 0, gameSpeed = 6;
let groundY = 0;
const FIREBALL_START_SCORE = 500;

const player = { x: 90, y: 0, vy: 0, jumping: false, legDir: 1, animTick: 0 };
let obstacles = [], fireballs = [];
let framesToNextObstacle = 60;
let framesToNextFireball = 0;
let runStartTime = 0;

function getGroundY() { return canvas.height - 80; }

/* ============================================================
   LEADERBOARD UI
   ============================================================ */
function renderRows(rows) {
  if (!rows || !rows.length) return '<div style="color:#555;font-size:9px;text-align:center">no runs yet</div>';
  return rows.map((e,i)=>{
    const medal = i===0?'1':i===1?'2':i===2?'3':`${i+1}`;
    const nm = (e.name||'???').slice(0,9);
    return `<div class="lb-row"><span class="lb-rank">${medal}.</span><span class="lb-name">${nm}</span><span style="color:#FFD700">${e.score}</span></div>`;
  }).join('');
}

async function refreshLeaderboard() {
  // in-game side panel (shows current side's top runs)
  const el = document.getElementById('lb-entries');
  const status = document.getElementById('lb-status');
  const menuStatus = document.getElementById('menu-lb-status');

  if (!LB_ENABLED) {
    if (el) el.innerHTML = '<div style="color:#555;font-size:9px">offline mode</div>';
    if (status) status.textContent = 'set supabase keys';
    if (menuStatus) menuStatus.textContent = 'offline mode — set supabase keys to enable the VS battle';
    return;
  }

  const [messiRows, ronaldoRows] = await Promise.all([
    sbFetchTopForPlayer('messi'),
    sbFetchTopForPlayer('ronaldo')
  ]);

  // dual leaderboards on menu
  const lbM = document.getElementById('lb-messi');
  const lbR = document.getElementById('lb-ronaldo');
  if (lbM) lbM.innerHTML = renderRows(messiRows);
  if (lbR) lbR.innerHTML = renderRows(ronaldoRows);

  // champion scores = top single run for each side
  const messiBest = (messiRows && messiRows[0]) ? messiRows[0].score : 0;
  const ronaldoBest = (ronaldoRows && ronaldoRows[0]) ? ronaldoRows[0].score : 0;

  const vm = document.getElementById('vs-messi-score');
  const vr = document.getElementById('vs-ronaldo-score');
  if (vm) vm.textContent = messiBest || '—';
  if (vr) vr.textContent = ronaldoBest || '—';

  // meter: blue fill = messi share of the combined top
  const total = messiBest + ronaldoBest;
  const fill = document.getElementById('vs-meter-fill');
  if (fill) fill.style.width = total > 0 ? `${(messiBest/total)*100}%` : '50%';

  // winner highlight
  const sideM = document.getElementById('vs-messi');
  const sideR = document.getElementById('vs-ronaldo');
  const winner = document.getElementById('vs-winner');
  if (sideM && sideR) {
    sideM.classList.toggle('winning', messiBest > ronaldoBest);
    sideR.classList.toggle('winning', ronaldoBest > messiBest);
  }
  if (winner) {
    if (total === 0) winner.textContent = 'be the first to set a score';
    else if (messiBest > ronaldoBest) winner.textContent = `MESSI LEADS BY ${messiBest - ronaldoBest}`;
    else if (ronaldoBest > messiBest) winner.textContent = `RONALDO LEADS BY ${ronaldoBest - messiBest}`;
    else winner.textContent = 'DEAD EVEN';
  }
  if (menuStatus) menuStatus.textContent = '';

  // in-game side panel shows the player you're currently repping
  if (el) {
    const myRows = selectedPlayer === 'messi' ? messiRows : ronaldoRows;
    el.innerHTML = renderRows(myRows);
  }
  if (status) status.textContent = '';

  // show the player's own rank (if they have a personal best and aren't already visible)
  updateMyRank(messiRows, ronaldoRows);
}

async function updateMyRank(messiRows, ronaldoRows) {
  const pb = getPersonalBest();
  const myName = (getSavedName() || '').toUpperCase();
  // which side did the player last rep? default to currently selected
  const side = selectedPlayer; // 'messi' or 'ronaldo'
  const rows = side === 'messi' ? messiRows : ronaldoRows;
  const tagEl = document.getElementById(side === 'messi' ? 'rank-messi' : 'rank-ronaldo');
  const otherTag = document.getElementById(side === 'messi' ? 'rank-ronaldo' : 'rank-messi');
  if (otherTag) otherTag.textContent = '';
  if (!tagEl) return;
  if (!pb) { tagEl.textContent = ''; return; }

  // already visible in the top-50 list? then no need for a rank tag
  const visible = (rows || []).some(r => (r.name||'').toUpperCase() === myName && r.score === pb);
  if (visible) { tagEl.textContent = ''; return; }

  const rank = await sbFetchRank(side, pb);
  if (rank && rank <= 200) {
    tagEl.textContent = `YOU'RE RANK #${rank}`;
  } else if (rank && rank > 200) {
    tagEl.textContent = `OUTSIDE TOP 200 — KEEP GRINDING`;
  } else {
    tagEl.textContent = '';
  }
}

/* ============================================================
   SELECT SCREEN
   ============================================================ */
function drawJerseyPreview(canvasEl, jersey, who) {
  const c = canvasEl.getContext('2d');
  c.clearRect(0,0,canvasEl.width,canvasEl.height);
  const prev = selectedPlayer; selectedPlayer = who;
  drawPlayerSprite(c, canvasEl.width/2, 2, jersey, 3);
  selectedPlayer = prev;
}
function buildJerseyRow(who) {
  const row = document.getElementById('jersey-row'); row.innerHTML='';
  jerseys[who].forEach((j,i)=>{
    const div=document.createElement('div');
    div.className='jersey-card'+(i===selectedJerseyIdx?' selected':'');
    div.innerHTML=`<canvas width="60" height="72"></canvas><div class="jersey-label">${j.label}</div>`;
    div.onclick=()=>{ document.querySelectorAll('.jersey-card').forEach(c=>c.classList.remove('selected')); div.classList.add('selected'); selectedJerseyIdx=i; currentJersey=jerseys[selectedPlayer][i]; };
    row.appendChild(div);
    setTimeout(()=>drawJerseyPreview(div.querySelector('canvas'), j, who),0);
  });
}
function selectPlayer(p) {
  selectedPlayer=p; selectedJerseyIdx=0; currentJersey=jerseys[p][0];
  document.getElementById('card-messi').classList.toggle('selected', p==='messi');
  document.getElementById('card-ronaldo').classList.toggle('selected', p==='ronaldo');
  buildJerseyRow(p); drawPreviews();
}
function drawPreviews() {
  ['messi','ronaldo'].forEach(p=>{
    const cv=document.getElementById('preview-'+p); if(!cv) return;
    const c=cv.getContext('2d'); c.clearRect(0,0,cv.width,cv.height);
    const prev=selectedPlayer; selectedPlayer=p;
    drawPlayerSprite(c, cv.width/2, 2, jerseys[p][0], 3);
    selectedPlayer=prev;
  });
}

/* ============================================================
   OBSTACLE PACING  (trex-style)
   ============================================================ */
function scheduleNextObstacle() {
  // randomized gap that tightens as speed rises (like trex 50-150 frames)
  const minGap = Math.max(45, 90 - gameSpeed * 3);
  const maxGap = Math.max(90, 160 - gameSpeed * 4);
  framesToNextObstacle = Math.floor(minGap + Math.random() * (maxGap - minGap));
}
function scheduleNextFireball() {
  framesToNextFireball = Math.floor(160 + Math.random() * 220);
}
function jumpAirtimeFrames() { return (2 * 16) / 0.8; } // 40
function safeGapPx() {
  return jumpAirtimeFrames() * gameSpeed + 70;
}
function rightmostObstacleX() {
  let maxX = -Infinity;
  for (const o of obstacles) maxX = Math.max(maxX, o.x + o.w);
  for (const f of fireballs) maxX = Math.max(maxX, f.x + 20);
  return maxX === -Infinity ? -Infinity : maxX;
}
function clearToSpawn() {
  const last = rightmostObstacleX();
  if (last === -Infinity) return true;
  return (canvas.width - last) >= safeGapPx();
}
function spawnObstacle() {
  groundY = getGroundY();
  obstacles.push({ x: canvas.width + 10, y: groundY, w: 48, h: 80, type:'goalpost', passed:false });
}
function spawnFireball() {
  groundY = getGroundY();
  const band = groundY - 95 - Math.random() * 40;
  fireballs.push({ x: canvas.width + 20, y: band, passed:false });
}

function checkCollision(obs) {
  const px=player.x-12, py=player.y-54, pw=24, ph=54;
  if (obs.type==='goalpost') {
    return px+pw > obs.x+4 && px < obs.x+obs.w-4 && py+ph > obs.y-obs.h+4 && py < obs.y+4;
  }
  const dx=player.x-obs.x, dy=(player.y-27)-obs.y;
  return Math.sqrt(dx*dx+dy*dy) < 22;
}

/* ============================================================
   FLOW
   ============================================================ */
function startGame() {
  initAudio();
  const nameInput = document.getElementById('player-name-input');
  const nm = (nameInput.value || getSavedName() || 'PLAYER').toUpperCase().slice(0,12);
  setSavedName(nm); nameInput.value = nm;

  document.getElementById('select-screen').style.display='none';
  document.getElementById('hud').style.display='block';
  document.getElementById('leaderboard-panel').style.display='block';
  document.getElementById('speed-indicator').style.display='block';

  gameState='playing'; score=0; frame=0; gameSpeed=6;
  runStartTime = Date.now();
  obstacles=[]; fireballs=[];
  groundY=getGroundY(); regenStars(canvas.width, canvas.height);
  player.y=groundY; player.vy=0; player.jumping=false;
  scheduleNextObstacle(); framesToNextFireball = 99999;

  document.getElementById('hud-best').textContent = 'BEST ' + getPersonalBest();
  document.getElementById('lb-panel-title').textContent = 'TOP ' + (selectedPlayer === 'messi' ? 'MESSI' : 'CR7') + ' RUNS';
  startMusic();
  requestAnimationFrame(loop);
}
function jump() {
  if (gameState!=='playing') return;
  if (!player.jumping) { player.vy=-16; player.jumping=true; playJumpSound(); }
}
document.addEventListener('keydown', e=>{ if(e.code==='Space'||e.code==='ArrowUp'){ e.preventDefault(); if(gameState==='over'){restartGame();return;} jump(); } });
canvas.addEventListener('click', jump);
canvas.addEventListener('touchstart', e=>{ e.preventDefault(); jump(); }, {passive:false});

async function gameOver() {
  gameState='over';
  stopMusic();
  playHitSound();
  document.getElementById('gameover-screen').style.display='flex';
  document.getElementById('go-score-text').textContent = `Score: ${score}`;
  const pb = getPersonalBest();
  if (score > pb) {
    setPersonalBest(score);
    document.getElementById('go-best-text').textContent = `NEW PERSONAL BEST: ${score}!`;
  } else {
    document.getElementById('go-best-text').textContent = `Personal best: ${pb}`;
  }
  const nm = getSavedName() || 'PLAYER';
  await sbInsertScore(nm, score, selectedPlayer, currentJersey.id);
  refreshLeaderboard();
}
function restartGame() { document.getElementById('gameover-screen').style.display='none'; startGame(); }
function goToMenu() {
  stopMusic();
  document.getElementById('gameover-screen').style.display='none';
  document.getElementById('hud').style.display='none';
  document.getElementById('leaderboard-panel').style.display='none';
  document.getElementById('speed-indicator').style.display='none';
  document.getElementById('select-screen').style.display='flex';
  document.getElementById('personal-best-tag').textContent = 'YOUR BEST: ' + getPersonalBest();
  gameState='select';
}

/* ============================================================
   LOOP
   ============================================================ */
function loop() {
  if (gameState!=='playing') return;
  frame++; groundY=getGroundY();
  gameSpeed = 6 + Math.floor(score/200) * 0.6;
  if (gameSpeed > 14) gameSpeed = 14;

  player.vy += 0.8; player.y += player.vy;
  if (player.y>=groundY){ player.y=groundY; player.vy=0; player.jumping=false; }

  score++;
  document.getElementById('score-display').textContent = score;
  document.getElementById('speed-indicator').textContent = `speed ${gameSpeed.toFixed(1)}x`;

  // fireballs unlock at FIREBALL_START_SCORE
  if (score === FIREBALL_START_SCORE) scheduleNextFireball();

  framesToNextObstacle--;
  if (framesToNextObstacle <= 0) {
    if (clearToSpawn()) { spawnObstacle(); scheduleNextObstacle(); }
  }

  if (score >= FIREBALL_START_SCORE) {
    framesToNextFireball--;
    if (framesToNextFireball <= 0) {
      if (clearToSpawn()) { spawnFireball(); scheduleNextFireball(); }
    }
  }

  for (let o of obstacles) o.x -= gameSpeed;
  for (let f of fireballs) f.x -= gameSpeed + 2;

  for (let o of obstacles) if (checkCollision(o)) return void gameOver();
  for (let f of fireballs) if (checkCollision(f)) return void gameOver();

  obstacles = obstacles.filter(o=>o.x>-200);
  fireballs = fireballs.filter(f=>f.x>-50);

  const w=canvas.width, h=canvas.height;
  ctx.clearRect(0,0,w,h);
  drawBg(ctx,w,h,frame);
  drawGround(ctx,groundY,w);
  for (let o of obstacles) drawGoalpost(ctx,o.x,o.y);
  for (let f of fireballs) drawFireball(ctx,f.x,f.y,frame);

  player.animTick++;
  ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.ellipse(player.x,groundY+4,20,6,0,0,Math.PI*2); ctx.fill();
  drawPlayerSprite(ctx, player.x, player.y-54, currentJersey, SCALE);

  if (score === FIREBALL_START_SCORE) {
    ctx.fillStyle='#FF4500'; ctx.font='bold 20px Courier New'; ctx.textAlign='center';
    ctx.fillText('FIREBALLS INCOMING', w/2, h*0.3); ctx.textAlign='left';
  }
  requestAnimationFrame(loop);
}

/* ============================================================
   INIT
   ============================================================ */
(function init(){
  document.getElementById('player-name-input').value = getSavedName();
  document.getElementById('personal-best-tag').textContent = 'YOUR BEST: ' + getPersonalBest();
  selectPlayer('messi'); drawPreviews(); buildJerseyRow('messi');
  refreshLeaderboard();
})();
</script>
